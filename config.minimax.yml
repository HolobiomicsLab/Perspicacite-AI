# Perspicacité v2 Configuration - Minimax for Chinese Users
# 
# ⚠️  WARNING: Minimax implementation needs fixes
# There are response parsing issues with the Anthropic-compatible API
# Consider using DeepSeek or OpenAI as alternative
#
# This configuration uses the Chinese Minimax endpoint:
#   https://api.minimaxi.com/anthropic
#
# For international users, use https://api.minimax.io/v1 instead.
#
# Set your Minimax API key via MINIMAX_API_KEY environment variable.
#
# Supported models:
#   - MiniMax-M2.7 (latest, recommended)
#   - MiniMax-M2.1 (multi-language programming)
#   - MiniMax-M2.1-lightning (faster, ~100 TPS)
#   - MiniMax-M2 (agentic capabilities)

version: "2.0.0"
config_name: "minimax"

# Server settings
server:
  host: "0.0.0.0"
  port: 8000
  reload: false

# LLM configuration - Minimax via LiteLLM
llm:
  default_provider: "minimax"
  default_model: "MiniMax-M2.7"  # Latest model
  
  # Provider configurations
  providers:
    # Minimax uses Anthropic-compatible API
    minimax:
      base_url: "https://api.minimaxi.com/anthropic"
      timeout: 120
      max_retries: 3
    
    # Other providers available as fallback
    anthropic:
      base_url: "https://api.anthropic.com"
      timeout: 120
      max_retries: 3
    
    openai:
      base_url: "https://api.openai.com/v1"
      timeout: 60
      max_retries: 3
  
  context:
    max_tokens: 8000
    chat_history_turns: 10
    summarize_threshold: 20

# Knowledge base defaults
knowledge_base:
  embedding_model: "text-embedding-3-small"
  chunk_size: 1000
  chunk_overlap: 200
  preserve_sections: true
  default_top_k: 10
  similarity_threshold: 0.7

# Database
database:
  path: "~/.local/share/perspicacite/memory.db"
  chroma_path: "./chroma_db"

# RAG modes
rag_modes:
  quick:
    max_iterations: 1
    tools: ["kb_search"]
    rerank: false
    
  standard:
    max_iterations: 1
    tools: ["kb_search"]
    rerank: true
    
  advanced:
    max_iterations: 2
    tools: ["kb_search", "web_search"]
    rerank: true
    query_expansion: true
    
  deep:
    max_iterations: 5
    tools: ["kb_search", "web_search", "fetch_pdf", "citation_network"]
    rerank: true
    enable_planning: true
    enable_reflection: true

# SciLEx integration
scilex:
  enabled: true
  apis:
    semantic_scholar:
      enabled: true
      rate_limit: 100
    openalex:
      enabled: true
      rate_limit: 100
    pubmed:
      enabled: true
      rate_limit: 10

# Web search
web_search:
  providers: ["google_scholar", "semantic_scholar"]
  cache_ttl: 3600

# Logging
logging:
  level: "INFO"
  format: "json"

# UI
ui:
  theme: "system"
  citation_format: "nature"
